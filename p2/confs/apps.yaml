# ===========================================================================
# Application Deployments and Services
# ===========================================================================
# This YAML file defines three applications (app-one, app-two, and app-three)
# along with their corresponding services. Each application is deployed as a
# Kubernetes Deployment with specified replicas and a simple HTTP echo container.
# The services expose the applications on port 80, forwarding to the container
# port 5678.
# ===========================================================================

apiVersion: apps/v1 # this line specifies the API version
kind: Deployment # this line specifies the kind of resource
metadata:
  name: app-one
spec:
  replicas: 1
  selector:
    matchLabels: # this line specifies the labels to match
      app: app-one
  template:
    metadata:
      labels:
        app: app-one
    spec:
      containers:
      - name: app-one
        image: hashicorp/http-echo
        args: ["-text=Hello from App One"]
        ports: [{ containerPort: 5678 }]
---
apiVersion: v1 # this line specifies the API version
kind: Service # this line specifies the kind of resource
metadata:
  name: app-one
spec:
  selector:
    app: app-one
  ports: [{ port: 80, targetPort: 5678 }]
---
apiVersion: apps/v1 # this line specifies the API version
kind: Deployment # this line specifies the kind of resource
metadata:
  name: app-two
spec:
  replicas: 3
  selector:
    matchLabels: # this line specifies the labels to match
      app: app-two
  template:
    metadata:
      labels:
        app: app-two
    spec:
      containers:
      - name: app-two
        image: hashicorp/http-echo
        args: ["-text=Hello from App Two"]
        ports: [{ containerPort: 5678 }]
---
apiVersion: v1 # this line specifies the API version
kind: Service # this line specifies the kind of resource
metadata:
  name: app-two
spec:
  selector:
    app: app-two
  ports: [{ port: 80, targetPort: 5678 }]
---
apiVersion: apps/v1 # this line specifies the API version
kind: Deployment # this line specifies the kind of resource
metadata:
  name: app-three
spec:
  replicas: 1
  selector:
    matchLabels: # this line specifies the labels to match
      app: app-three
  template:
    metadata:
      labels:
        app: app-three
    spec:
      containers:
      - name: app-three
        image: hashicorp/http-echo
        args: ["-text=Hello from App Three"]
        ports: [{ containerPort: 5678 }]
---
apiVersion: v1 # this line specifies the API version
kind: Service # this line specifies the kind of resource
metadata:
  name: app-three
spec:
  selector:
    app: app-three
  ports: [{ port: 80, targetPort: 5678 }]
---
